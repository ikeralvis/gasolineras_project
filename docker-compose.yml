# All services share one Neon / Supabase PostgreSQL database.
# Set DATABASE_URL in .env — no local postgres container needed.

services:
  gasolineras:
    build: ./gasolineras-service
    container_name: gasolineras-service
    env_file:
      - .env
    ports:
      - "${GASOLINERAS_PORT}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 8000
      USUARIOS_SERVICE_URL: http://usuarios:3001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret-change-in-production}
      AUTO_ENSURE_FRESH_ON_STARTUP: ${AUTO_ENSURE_FRESH_ON_STARTUP:-true}
      AUTO_SYNC_ON_READ: ${AUTO_SYNC_ON_READ:-false}
      AUTO_SYNC_COOLDOWN_MINUTES: ${AUTO_SYNC_COOLDOWN_MINUTES:-30}
      HISTORICAL_SCOPE: ${HISTORICAL_SCOPE:-all}
      RAW_EXPORT_ENABLED: ${RAW_EXPORT_ENABLED:-false}
      RAW_EXPORT_GCS_BUCKET: ${RAW_EXPORT_GCS_BUCKET:-}
      RAW_EXPORT_GCS_PREFIX: ${RAW_EXPORT_GCS_PREFIX:-raw/}
      RAW_EXPORT_PARQUET_COMPRESSION: ${RAW_EXPORT_PARQUET_COMPRESSION:-snappy}
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  usuarios:
    build: ./usuarios-service
    container_name: usuarios-service
    env_file:
      - .env
    ports:
      - "${USUARIOS_PORT}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret-change-in-production}
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    build: ./gateway-hono
    container_name: gateway-hono
    env_file:
      - .env
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      PORT: 8080
      USUARIOS_SERVICE_URL: http://usuarios:3001
      GASOLINERAS_SERVICE_URL: http://gasolineras:8000
      RECOMENDACION_SERVICE_URL: http://recomendacion:8001
      VOICE_ASSISTANT_SERVICE_URL: http://voice-assistant:8090
      PREDICTION_SERVICE_URL: ${PREDICTION_SERVICE_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:80}
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret-change-in-production}
      NODE_ENV: ${NODE_ENV:-development}
      GASOLINERAS_AUTO_ENSURE_FRESH_ENABLED: ${GASOLINERAS_AUTO_ENSURE_FRESH_ENABLED:-true}
      GASOLINERAS_STARTUP_ENSURE_FRESH: ${GASOLINERAS_STARTUP_ENSURE_FRESH:-true}
      GASOLINERAS_AUTO_ENSURE_INTERVAL_MINUTES: ${GASOLINERAS_AUTO_ENSURE_INTERVAL_MINUTES:-60}
    depends_on:
      usuarios:
        condition: service_healthy
      gasolineras:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s

  recomendacion:
    build: ./recomendacion-service
    container_name: recomendacion-service
    env_file:
      - .env
    ports:
      - "${RECOMENDACION_PORT:-8002}:8001"
    environment:
      GASOLINERAS_API_URL: http://gateway:8080/api/gasolineras/?limit=20000

      ROUTING_BACKEND: ${ROUTING_BACKEND:-ors}
      ROUTING_FAILOVER_TO_OSRM: ${ROUTING_FAILOVER_TO_OSRM:-false}
      ALLOW_STRAIGHT_LINE_FALLBACK: ${ALLOW_STRAIGHT_LINE_FALLBACK:-false}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-http://router.project-osrm.org}
      ORS_API_KEY: ${ORS_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      gateway:
        condition: service_started
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  prediccion:
    profiles: ["ml"]
    build: ./prediction-service
    container_name: prediction-service
    env_file:
      - .env
    ports:
      - "${PREDICTION_PORT:-8003}:8001"
    environment:
      RUN_HTTP_API: "true"
      API_HOST: 0.0.0.0
      API_PORT: 8001
      DATABASE_URL: ${DATABASE_URL}
      USUARIOS_SERVICE_URL: http://usuarios:3001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret-change-in-production}
      SOURCE_MODE: ${PREDICTION_SOURCE_MODE:-favorites}
      FAVORITES_SOURCE: ${PREDICTION_FAVORITES_SOURCE:-usuarios-service}
      TOP_N_STATIONS: ${PREDICTION_TOP_N_STATIONS:-500}
      MIN_FAVORITES_COUNT: ${PREDICTION_MIN_FAVORITES_COUNT:-1}
      STATION_IDS: ${PREDICTION_STATION_IDS:-15158,152,10889}
      FUELS: ${PREDICTION_FUELS:-Precio Gasolina 95 E5|Precio Gasoleo A}
      FORCE_RETRAIN: ${PREDICTION_FORCE_RETRAIN:-false}
      ENABLE_GCS_BACKUP: ${PREDICTION_ENABLE_GCS_BACKUP:-false}
      LOCAL_RAW_GLOB: ${PREDICTION_LOCAL_RAW_GLOB:-/tmp/raw/*.parquet}
      GCS_BUCKET: ${PREDICTION_GCS_BUCKET:-}
      GCS_RAW_PREFIX: ${PREDICTION_GCS_RAW_PREFIX:-raw/}
      GCS_MODEL_PREFIX: ${PREDICTION_GCS_MODEL_PREFIX:-modelos_lgbm/}
      GCS_OUTPUT_PREFIX: ${PREDICTION_GCS_OUTPUT_PREFIX:-predicciones/}
    depends_on:
      usuarios:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend-client
      args:
        VITE_API_BASE_URL: http://localhost:${GATEWAY_PORT}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: frontend-client
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      gateway:
        condition: service_healthy

  mcp-gasolineras:
    profiles: ["ai"]
    build: ./mcp-gasolineras-server
    container_name: mcp-gasolineras-server
    env_file:
      - .env
    environment:
      GATEWAY_BASE_URL: http://gateway:8080
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret-change-in-production}
      HTTP_TIMEOUT_MS: ${MCP_HTTP_TIMEOUT_MS:-10000}
    depends_on:
      gateway:
        condition: service_healthy

  voice-assistant:
    profiles: ["ai"]
    build: ./voice-assistant-service
    container_name: voice-assistant-service
    env_file:
      - .env
    ports:
      - "${VOICE_ASSISTANT_PORT:-8090}:8090"
    environment:
      PORT: 8090
      GATEWAY_BASE_URL: http://gateway:8080
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_ROUTER_MODEL: ${OPENAI_ROUTER_MODEL:-gpt-4o-mini}
      OPENAI_LLM_MODEL: ${OPENAI_LLM_MODEL:-gpt-4o-mini}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-whisper-1}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-nova}
      OPENAI_TTS_FORMAT: ${OPENAI_TTS_FORMAT:-mp3}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-12000}
      OPENAI_ROUTER_MAX_TOKENS: ${OPENAI_ROUTER_MAX_TOKENS:-80}
      OPENAI_LLM_MAX_TOKENS: ${OPENAI_LLM_MAX_TOKENS:-180}
      VOICE_RATE_LIMIT_WINDOW_MS: ${VOICE_RATE_LIMIT_WINDOW_MS:-60000}
      VOICE_RATE_LIMIT_MAX_REQUESTS: ${VOICE_RATE_LIMIT_MAX_REQUESTS:-40}
      VOICE_MAX_TEXT_CHARS: ${VOICE_MAX_TEXT_CHARS:-450}
      VOICE_MAX_AUDIO_BASE64_CHARS: ${VOICE_MAX_AUDIO_BASE64_CHARS:-5500000}
      VOICE_MAX_KM: ${VOICE_MAX_KM:-25}
      VOICE_ENABLE_TTS_AUDIO: ${VOICE_ENABLE_TTS_AUDIO:-true}
    depends_on:
      gateway:
        condition: service_healthy

# (no local volumes needed — all data is in Neon cloud)
