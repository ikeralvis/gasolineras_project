steps:
  # 1. Construir la imagen del Frontend
  # Define _VITE_API_BASE_URL en el trigger de Cloud Build.
  # VITE_GOOGLE_CLIENT_ID se inyecta desde Secret Manager en build-time.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    secretEnv: ['VITE_GOOGLE_CLIENT_ID_SECRET']
    args:
      - '-c'
      - |
        API_BASE_URL="$(printf '%s' "${_VITE_API_BASE_URL}" | tr -d '\r\n')"
        GOOGLE_CLIENT_ID="$(printf '%s' "$$VITE_GOOGLE_CLIENT_ID_SECRET" | tr -d '\r\n')"
        API_BASE_URL_LOWER="$(printf '%s' "$$API_BASE_URL" | tr '[:upper:]' '[:lower:]')"

        if [ -z "$$API_BASE_URL" ]; then
          echo "ERROR: _VITE_API_BASE_URL vacío. Define este valor en el trigger de Cloud Build.";
          exit 1;
        fi
        if [[ "$$API_BASE_URL_LOWER" == *"reemplazar"* || "$$API_BASE_URL_LOWER" == *"placeholder"* ]]; then
          echo "ERROR: _VITE_API_BASE_URL contiene valor placeholder (reemplazar/placeholder).";
          exit 1;
        fi
        if [[ "$$API_BASE_URL" != https://* ]]; then
          echo "ERROR: _VITE_API_BASE_URL debe empezar por https:// para evitar errores de certificado/CORS.";
          exit 1;
        fi

        echo "INFO: Usando _VITE_API_BASE_URL=$$API_BASE_URL"

        if [ -z "$$GOOGLE_CLIENT_ID" ]; then
          echo "ERROR: Secret GOOGLE_CLIENT_ID vacío o no accesible";
          exit 1;
        fi
        if [[ "$$GOOGLE_CLIENT_ID" != *.apps.googleusercontent.com ]]; then
          echo "ERROR: GOOGLE_CLIENT_ID inválido. Debe terminar en .apps.googleusercontent.com";
          exit 1;
        fi

        docker build \
          -t europe-west1-docker.pkg.dev/${PROJECT_ID}/tankgo/frontend-img \
          --build-arg VITE_API_BASE_URL=$$API_BASE_URL \
          --build-arg VITE_GOOGLE_CLIENT_ID=$$GOOGLE_CLIENT_ID \
          frontend-client

  # 2. Subir al registro
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/${PROJECT_ID}/tankgo/frontend-img']

  # 3. Desplegar en Cloud Run
  # Nota: no se fuerza allow-unauthenticated aqui para evitar fallos IAM en trigger.
  # Configura visibilidad publica/privada desde Cloud Run UI una sola vez.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontend-client'
      - '--image'
      - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/tankgo/frontend-img'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'

images:
  - 'europe-west1-docker.pkg.dev/${PROJECT_ID}/tankgo/frontend-img'

substitutions:
  _VITE_API_BASE_URL: ''

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CLIENT_ID/versions/latest
      env: 'VITE_GOOGLE_CLIENT_ID_SECRET'

options:
  logging: CLOUD_LOGGING_ONLY