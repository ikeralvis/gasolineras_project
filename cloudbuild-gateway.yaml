steps:
  # 1. Construir la imagen Docker apuntando a la carpeta del microservicio
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/tankgo/gateway-img', './gateway-hono']

  # 2. Subir la imagen al registro de Google (Artifact Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/tankgo/gateway-img']

  # 3. Desplegar en Cloud Run
  # Nota: no se fuerza allow-unauthenticated aqui para evitar fallos IAM en trigger.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gateway-hono'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/tankgo/gateway-img'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/tankgo/gateway-img'

options:
  logging: CLOUD_LOGGING_ONLY